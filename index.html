<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agent Registration</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f1923;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1f2731;
padding:40px;
border-radius:8px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
border:2px solid #ff4655;
}

h1{
margin-bottom:25px;
letter-spacing:2px;
color:#ff4655;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:4px;
background:#0f1923;
color:white;
border:1px solid #333;
}

input:focus{
outline:none;
border:1px solid #ff4655;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:4px;
background:#ff4655;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ff2a3d;
}

.subtitle{
font-size:13px;
color:#aaa;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="box">

<h1>AGENT ACCESS</h1>
<div class="subtitle">Secure Valorant System</div>

<form>
<input type="text" placeholder="Nickname">
<input type="email" placeholder="Email">
<input type="text" placeholder="Agent Name">
<button type="submit">ENTER</button>
</form>

</div>

</body>
</html>
