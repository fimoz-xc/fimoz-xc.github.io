<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fimoz XC</title>

<style>
body{
font-family: Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>

</head>

<body>

<div class="box">

<h2>Регистрация</h2>

<form>
<input type="text" placeholder="Логин">
<input type="password" placeholder="Пароль">
<button>Создать аккаунт</button>
</form>

</div>

</body>
</html>
