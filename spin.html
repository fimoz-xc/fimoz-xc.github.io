<!DOCTYPE html>
<html>
<head>
<title>Free Valorant Spin</title>

<style>

body{
background:#0f1923;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ff4655;
margin-top:40px;
}

#wheel{
width:300px;
height:300px;
border-radius:50%;
border:10px solid #ff4655;
margin:40px auto;
transition: transform 4s ease-out;
}

button{
padding:15px 40px;
font-size:18px;
background:#ff4655;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎁 1 FREE SPIN</h1>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<script>

function spin(){

let wheel = document.getElementById("wheel")

let random = Math.floor(Math.random()*3600)

wheel.style.transform = "rotate(" + random + "deg)"

}

</script>

</body>
</html>
