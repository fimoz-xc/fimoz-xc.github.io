<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Free Spin</title>

<style>
body{
background:#0f1923;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
color:#ff4655;
}

#wheel{
margin:40px auto;
width:300px;
height:300px;
border-radius:50%;
border:8px solid #ff4655;
position:relative;
overflow:hidden;
transition:transform 4s ease-out;
}

.slice{
position:absolute;
width:50%;
height:50%;
background:#1f2731;
transform-origin:100% 100%;
}

button{
background:#ff4655;
border:none;
padding:15px 30px;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
}
</style>
</head>

<body>

<h1>🎁 1 FREE SPIN</h1>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<script>

let wheel = document.getElementById("wheel");

let skins = [
"Vandal Skin",
"Phantom Skin",
"Knife Skin",
"Operator Skin",
"Sheriff Skin",
"Classic Skin"
];

for(let i=0;i<6;i++){

let slice = document.createElement("div");
slice.className = "slice";
slice.style.transform = "rotate(" + (i*60) + "deg) skewY(-30deg)";
wheel.appendChild(slice);

}

function spin(){

let deg = Math.floor(2000 + Math.random()*2000);

wheel.style.transform = "rotate(" + deg + "deg)";

let win = skins[Math.floor(Math.random()*skins.length)];

setTimeout(()=>{
alert("You won: " + win);
},4000);

}

</script>

</body>
</html>
